<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokrat Pro Tech Contact Uploader</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(15, 15, 15, 0.85);
            --border-color: rgba(220, 38, 38, 0.15);
            --primary: #dc2626;
            --primary-hover: #b91c1c;
            --primary-glow: rgba(220, 38, 38, 0.35);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(220, 38, 38, 0.12), transparent 450px),
                              radial-gradient(circle at bottom left, rgba(15, 15, 15, 0.8), transparent 450px);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px rgba(220, 38, 38, 0.05);
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(220, 38, 38, 0.25);
        }

        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-main {
            width: 160px;
            height: auto;
            max-height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(220, 38, 38, 0.2));
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(220, 38, 38, 0.2)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(220, 38, 38, 0.4)); }
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fca5a5, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            direction: rtl;
        }

        .stats {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats span {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .stats strong {
            font-size: 1.25rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.3);
        }

        .dropzone {
            border: 2px dashed rgba(220, 38, 38, 0.25);
            border-radius: 18px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: rgba(220, 38, 38, 0.01);
            margin-bottom: 25px;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--primary);
            background: rgba(220, 38, 38, 0.05);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.1);
        }

        .dropzone-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            direction: rtl;
        }

        .dropzone-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            direction: rtl;
        }

        .dropzone-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            direction: rtl;
        }

        #file-input {
            display: none;
        }

        #selected-file {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #fca5a5;
            font-weight: 600;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #b91c1c, #dc2626);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.25);
        }

        .btn:hover {
            background: linear-gradient(to right, #991b1b, #b91c1c);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.35);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.25);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #status-msg {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            text-align: left;
            line-height: 1.4;
        }

        .msg-success {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .msg-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='logo.png') }}" class="logo-main" alt="Sokrat Pro Tech Logo">
            </div>
            
            <h1>Sokrat Pro Tech</h1>
            <p class="subtitle">تنزيل ورفع جهات الاتصال إلى النظام</p>
            
            <div class="stats">
                <span>Total Contacts:</span>
                <strong id="contact-count">{{ contact_count }}</strong>
            </div>

            <form id="upload-form">
                <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
                    <p class="dropzone-text">حمل جهات الاتصال من هنا</p>
                    <p class="dropzone-subtext">اسحب وأفلت ملف CSV هنا أو اضغط للاختيار</p>
                    <p class="dropzone-hint">يدعم ملفات جوجل وملفات الاسم والرقم القياسية</p>
                    <input type="file" id="file-input" name="file" accept=".csv">
                    <p id="selected-file"></p>
                </div>

                <button type="submit" class="btn" id="submit-btn" disabled>استيراد جهات الاتصال</button>
            </form>

            <div class="loading-spinner" id="spinner"></div>
            <div id="status-msg"></div>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');
        const selectedFile = document.getElementById('selected-file');
        const submitBtn = document.getElementById('submit-btn');
        const uploadForm = document.getElementById('upload-form');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('status-msg');

        // Drag & drop logic
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, e => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, e => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
            }, false);
        });

        dropzone.addEventListener('drop', e => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length > 0) {
                fileInput.files = files;
                updateFileLabel();
            }
        });

        fileInput.addEventListener('change', updateFileLabel);

        function updateFileLabel() {
            if(fileInput.files.length > 0) {
                selectedFile.textContent = "📄 " + fileInput.files[0].name;
                submitBtn.disabled = false;
            } else {
                selectedFile.textContent = "";
                submitBtn.disabled = true;
            }
        }

        uploadForm.addEventListener('submit', async e => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            submitBtn.style.display = 'none';
            spinner.style.display = 'block';
            statusMsg.style.display = 'none';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                spinner.style.display = 'none';
                
                if (result.success) {
                    statusMsg.className = "msg-success";
                    statusMsg.innerHTML = "<strong>تم بنجاح!</strong> " + result.message;
                    setTimeout(() => location.reload(), 2000);
                } else {
                    submitBtn.style.display = 'block';
                    statusMsg.className = "msg-error";
                    statusMsg.innerHTML = "<strong>فشل:</strong> " + result.error;
                }
                statusMsg.style.display = 'block';
            } catch (err) {
                spinner.style.display = 'none';
                submitBtn.style.display = 'block';
                statusMsg.className = "msg-error";
                statusMsg.innerHTML = "<strong>فشل الرفع:</strong> " + err.message;
                statusMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
